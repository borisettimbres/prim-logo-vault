<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Logo Extractor Ultimate - IDF Mobilités</title>
    <style>
        :root { --primary: #00b0f0; --dark: #1a1a1a; --bg-card: #2a2a2a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: var(--bg-card); padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; max-width: 600px; border: 1px solid #444; }
        h1 { color: var(--primary); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .grid div { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .grid span { display: block; font-size: 1.5em; font-weight: bold; color: var(--primary); }
        .btn-link { 
            display: inline-block; background: var(--primary); color: white; text-decoration: none; 
            padding: 20px 40px; font-size: 1.2em; font-weight: bold; border-radius: 10px; 
            transition: 0.3s; width: 80%; text-transform: uppercase;
        }
        .btn-link:hover { background: #008cc0; transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 176, 240, 0.4); }
        .footer-note { margin-top: 30px; font-size: 0.8em; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Logo Extractor Ultimate 📦</h1>
    <p>Clique sur le bouton ci-dessous pour générer ton pack de logos complet.</p>

    <div class="grid">
        <div><span>5</span>RER<br>(A à E)</div>
        <div><span>16</span>Métros<br>(1 à 14)</div>
        <div><span>14</span>Trams<br>(T1 à T14)</div>
    </div>

    <a href="#" id="finalDownloadBtn" target="_blank" class="btn-link">Télécharger le ZIP</a>

    <div class="footer-note">
        Clé API : EmtVEm...EQdw<br>
        Note : Cette action consomme 1 crédit sur tes 10 quotidiens.
    </div>
</div>

<script>
    const API_KEY = 'EmtVEmNsBjhi42tjabYkcZlkKZblEQdw';

    // LISTE EXHAUSTIVE DES IDS DE LIGNES
    const LINE_IDS = [
        // --- RER ---
        'C01742', 'C01743', 'C01744', 'C01745', 'C01746', 
        
        // --- MÉTROS ---
        'C01371', 'C01372', 'C01373', 'C01386', 'C01374', 'C01375', 'C01376', 
        'C01377', 'C01387', 'C01378', 'C01379', 'C01380', 'C01381', 'C01382', 
        'C01383', 'C01384', 

        // --- TRAMWAYS ---
        'C01389', 'C01390', 'C01391', 'C01392', 'C01393', 'C01394', 'C01395', 
        'C01396', 'C01397', 'C01677', 'C01679', 'C01681', 'C01682', 'C01683', 'C01684'
    ];

    // Génération de l'URL directe
    const baseUrl = "https://prim.iledefrance-mobilites.fr/marketplace/ilico/getIcon/sprite";
    const params = `?lineIds=${LINE_IDS.join(',')}&format=zip_svg&apikey=${API_KEY}`;
    
    // On injecte l'URL dans le bouton
    document.getElementById('finalDownloadBtn').href = baseUrl + params;
</script>

</body>
</html>
