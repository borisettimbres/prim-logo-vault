<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Logo Extractor Ultimate - PRIM</title>
    <style>
        :root { --primary: #00b0f0; --dark: #1a1a1a; --success: #00ff00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: #2a2a2a; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; max-width: 650px; border: 1px solid #444; }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 25px 0; }
        .grid div { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        .grid strong { display: block; font-size: 1.4em; color: var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 18px; font-size: 1.1em; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn:hover { background: #008cc0; transform: translateY(-2px); }
        #status { margin-top: 20px; padding: 15px; background: #000; border-radius: 5px; font-family: monospace; font-size: 0.85em; text-align: left; display: none; max-height: 150px; overflow-y: auto; }
        .log-ok { color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h1>Logo Extractor Ultimate 📦</h1>
    <p style="color:#888">Téléchargement du pack complet SVG (Archive ZIP)</p>

    <div class="grid">
        <div><strong>5</strong>RER (A-E)</div>
        <div><strong>16</strong>Métros (1-14)</div>
        <div><strong>13</strong>Tramways</div>
    </div>

    <button id="extractBtn" class="btn">GÉNÉRER LE PACK LOGOS (ZIP)</button>

    <div id="status"></div>
    
    <p style="font-size: 0.7em; color: #555; margin-top: 20px;">
        Note : Utilise la clé EmtVEm...Quota : 1 requête.
    </p>
</div>

<script>
    const API_KEY = 'EmtVEmNsBjhi42tjabYkcZlkKZblEQdw';

    // LISTE OFFICIELLE ET COMPLÈTE
    const LINE_IDS = [
        // --- RER ---
        'C01742', // A
        'C01743', // B
        'C01744', // C
        'C01745', // D
        'C01746', // E
        
        // --- MÉTROS ---
        'C01371', // 1
        'C01372', // 2
        'C01373', // 3
        'C01386', // 3bis
        'C01374', // 4
        'C01375', // 5
        'C01376', // 6
        'C01377', // 7
        'C01387', // 7bis
        'C01378', // 8
        'C01379', // 9
        'C01380', // 10
        'C01381', // 11
        'C01382', // 12
        'C01383', // 13
        'C01384', // 14

        // --- TRAMWAYS ---
        'C01389', // T1
        'C01390', // T2
        'C01391', // T3a
        'C01392', // T3b
        'C01393', // T4
        'C01394', // T5
        'C01395', // T6
        'C01396', // T7
        'C01397', // T8
        'C01677', // T9
        'C01679', // T10
        'C01681', // T11
        'C01682', // T12
        'C01683'  // T13
    ];

    const btn = document.getElementById('extractBtn');
    const status = document.getElementById('status');

    function log(msg, isOk = false) {
        status.style.display = 'block';
        const div = document.createElement('div');
        if(isOk) div.className = 'log-ok';
        div.innerHTML = `> ${msg}`;
        status.appendChild(div);
        status.scrollTop = status.scrollHeight;
    }

    btn.onclick = async () => {
        btn.disabled = true;
        status.innerHTML = '';
        log("Génération de la requête pour " + LINE_IDS.length + " lignes...");

        const url = "https://prim.iledefrance-mobilites.fr/marketplace/ilico/getIcon/sprite";
        const params = `?lineIds=${LINE_IDS.join(',')}&format=zip_svg&apikey=${API_KEY}`;
        
        // Utilisation du proxy pour éviter les erreurs CORS en local ou sur GitHub Pages
        const finalUrl = `https://corsproxy.io/?${encodeURIComponent(url + params)}`;

        try {
            log("Appel au serveur PRIM via Proxy...");
            const response = await fetch(finalUrl);

            if (response.ok) {
                log("Archive ZIP reçue !", true);
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = "Pack_Logos_IDF_Complet.zip";
                a.click();
                log("Téléchargement terminé.", true);
            } else {
                log("Erreur " + response.status + ". Vérifie ton abonnement API.", false);
            }
        } catch (e) {
            log("Erreur réseau ou proxy saturé.", false);
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
