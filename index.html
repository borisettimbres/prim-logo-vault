<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Logo Extractor - IDF Mobilités (FIX 403)</title>
    <style>
        :root { --primary: #00b0f0; --dark: #1a1a1a; --error: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: #2a2a2a; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; max-width: 600px; border: 1px solid #444; }
        h1 { color: var(--primary); }
        .warning { background: #443300; border: 1px solid #ffcc00; padding: 15px; border-radius: 8px; font-size: 0.85em; margin-bottom: 20px; text-align: left; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 1.1em; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-alt { background: #444; margin-top: 10px; font-size: 0.9em; }
        #status { margin-top: 20px; padding: 15px; background: #111; border-radius: 5px; font-family: monospace; display: none; text-align: left; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h1>Logo Extractor Pro 📦</h1>
    
    <div class="warning">
        <strong>⚠️ IMPORTANT (ERREUR 403) :</strong><br>
        Assure-toi d'être allé sur le portail PRIM, sur la page de l'API <em>"Génération des indices de lignes"</em>, et d'avoir cliqué sur le bouton bleu <strong>"S'abonner"</strong>. Sans cela, ton jeton ne fonctionnera pas.
    </div>

    <button id="extractBtn" class="btn">Télécharger le ZIP (via Proxy)</button>
    <button id="linkBtn" class="btn btn-alt">Générer un lien direct (Sans Proxy)</button>

    <div id="status"></div>
</div>

<script>
    const API_KEY = 'EmtVEmNsBjhi42tjabYkcZlkKZblEQdw';
    
    const LINE_IDS = [
        'C01742','C01743','C01744','C01745','C01746', // RER
        'C01371','C01372','C01373','C01374','C01375','C01376','C01377','C01378','C01379','C01380','C01381','C01382','C01383','C01384','C01386','C01387', // METROS
        'C01389','C01390','C01391','C01392','C01393','C01394','C01395','C01396','C01397','C01677','C01679', // TRAMS
        'C01737','C01738','C01739','C01740','C01741','C01747','C01748','C01749' // TRAINS
    ];

    const baseUrl = "https://prim.iledefrance-mobilites.fr/marketplace/ilico/getIcon/sprite";
    const params = `?lineIds=${LINE_IDS.join(',')}&format=zip_svg`;

    const status = document.getElementById('status');

    // MÉTHODE 1 : Via Proxy (Automatique)
    document.getElementById('extractBtn').onclick = async function() {
        status.style.display = 'block';
        status.innerHTML = "> Connexion au serveur PRIM...";
        
        // On essaie de passer l'API KEY en Header via un proxy qui l'autorise
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(baseUrl + params)}`;
        
        try {
            const response = await fetch(proxyUrl, {
                headers: { 'apikey': API_KEY }
            });

            if (response.status === 403) {
                status.innerHTML = "<span style='color:red'>> ERREUR 403 : Accès refusé. Vérifie ton abonnement à l'API sur le portail PRIM.</span>";
                return;
            }

            if (response.ok) {
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Logos_IDF_Complet.zip";
                a.click();
                status.innerHTML = "<span style='color:green'>> Succès ! Le téléchargement a démarré.</span>";
            } else {
                status.innerHTML = `> Erreur : ${response.status}`;
            }
        } catch (e) {
            status.innerHTML = "> Erreur réseau ou Proxy saturé.";
        }
    };

    // MÉTHODE 2 : Lien Direct (Si le proxy bloque, l'utilisateur clique et le navigateur gère)
    document.getElementById('linkBtn').onclick = function() {
        const directUrl = `${baseUrl}${params}&apikey=${API_KEY}`;
        status.style.display = 'block';
        status.innerHTML = `> Lien direct généré :<br><br><a href="${directUrl}" target="_blank" style="color:var(--primary)">CLIQUE ICI POUR TÉLÉCHARGER LE ZIP</a><br><br>(Ouvre ce lien dans un nouvel onglet si le téléchargement ne démarre pas)`;
    };
</script>

</body>
</html>
